[NEAT]
fitness_criterion     = max
fitness_threshold     = 100.0
pop_size              = 30
reset_on_extinction   = False
no_fitness_termination = True

[DefaultGenome]
# NN inputs: angle, angular_velocity, base_accel, wheel_velocity
# NN output: supplementary corrective torque (normalized)
num_inputs            = 4
num_outputs           = 1
num_hidden            = 0
feed_forward          = True
initial_connection    = full

activation_default      = tanh
activation_options      = tanh

aggregation_default     = sum
aggregation_options     = sum

bias_init_mean          = 0.0
bias_init_stdev         = 1.0
bias_max_value          = 30.0
bias_min_value          = -30.0
bias_mutate_power       = 0.5
bias_mutate_rate        = 0.7
bias_replace_rate       = 0.1
bias_response_init_mean = 1.0
bias_response_init_stdev = 0.0
bias_response_mutate_power = 0.0
bias_response_mutate_rate = 0.0
bias_response_replace_rate = 0.0
bias_response_max_value = 30.0
bias_response_min_value = -30.0

weight_init_mean        = 0.0
weight_init_stdev       = 1.0
weight_max_value        = 30
weight_min_value        = -30
weight_mutate_power     = 0.5
weight_mutate_rate      = 0.8
weight_replace_rate     = 0.1

conn_add_prob           = 0.05
conn_delete_prob        = 0.0

node_add_prob           = 0.03
node_delete_prob        = 0.0

enabled_default         = True
enabled_mutate_rate     = 0.01
enabled_rate_to_true_add  = 0.0
enabled_rate_to_false_add = 0.0

response_init_mean      = 1.0
response_init_stdev     = 0.0
response_mutate_power   = 0.0
response_mutate_rate    = 0.0
response_replace_rate   = 0.0
response_max_value      = 30.0
response_min_value      = -30.0

[DefaultSpeciesSet]
compatibility_threshold = 3.0
compatibility_disjoint_coefficient = 1.0
compatibility_weight_coefficient = 0.4

[DefaultStagnation]
species_fitness_func = max
max_stagnation       = 15
species_elitism      = 2

[DefaultReproduction]
elitism            = 2
survival_threshold = 0.2
