# Optional YAML mirror of key NEAT hyperparameters (custom backend uses EvolutionConfig).
# Primary neat-python settings live in neat_config.ini.

custom_neat:
  population_size: 30
  compatibility_threshold: 1.2
  max_stagnation: 15
  elitism: 1
  survival_threshold: 0.35
  weight_mutate_rate: 0.8
  add_conn_rate: 0.12
  add_node_rate: 0.07
  toggle_rate: 0.02
  random_immigrant_rate: 0.05
