# Project settings: simulation, fitness weights, spectral targets, evolution

simulation:
  dt: 0.01
  duration: 8.0
  alpha: 0.3
  nn_torque_scale: 0.15
  max_wheel_torque: 0.5
  seismic_frequencies_hz: [0.5, 1.0, 2.0]
  seismic_amplitudes: [0.3, 0.2, 0.15]
  initial_angle: 0.12
  total_mass: 0.8
r_cm: 0.22
total_inertia: 0.045

wheel_mass: 0.18
wheel_radius: 0.045

arm_mass: 0.20
arm_length: 0.28

pendulum_damping: 0.08
wheel_damping: 0.03

wheel_inertia: 0.00018

max_wheel_torque: 0.25
max_wheel_speed: 120.0

motor_time_constant: 0.04

resonance_frequency: 11.0
resonance_gain: 0.015

angle_noise_std: 0.002
gyro_noise_std: 0.01
gyro_bias_drift_rate: 0.0001

broadband_noise_gain: 0.04

vibration_freqs_hz:
  - 3.0
  - 7.0

vibration_amps:
  - 0.03
  - 0.02

impulse_probability: 0.001
impulse_magnitude: 0.25

fitness:
  stability: 1.0
  amplification: 0.8
  noise: 0.5
  effort: 0.3
  unsafe: 1.5

# Smooth generation-dependent scheduling for the two main objectives.
# sigmoid(g) = 1 / (1 + exp(-k * (g - midpoint)))
#
# amplification(g) = amp_min + (amp_max - amp_min) * sigmoid(g)
# stability(g)     = stab_max - (stab_max - stab_min) * sigmoid(g)
schedule:
  max_generations: 500
  midpoint: 250
  k: 0.025
  stab_max: 3.0
  stab_min: 0.8
  amp_min: 0.5
  amp_max: 3.0

spectral:
  target_band_hz: [0.4, 1.5]
  noise_band_hz: [3.0, 8.0]

evolution:
  population_size: 30
  generations: 10 
  seed: 42
